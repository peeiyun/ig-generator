<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IG 貼文文案產生器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #faf9f7; --surface: #ffffff; --surface2: #f3f2ef;
    --border: #e2e0db; --border2: #cccac4; --text: #1a1a18;
    --text2: #6b6960; --text3: #a39f96; --accent: #c8773a;
    --accent-light: #fdf0e6; --radius: 10px; --radius-sm: 6px;
  }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  header { margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 22px; font-weight: 700; }
  header p { margin-top: 6px; font-size: 13px; color: var(--text2); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
  label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; margin-top: 10px; }
  label:first-of-type { margin-top: 0; }
  input[type="text"], input[type="number"], input[type="password"], textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 14px; color: var(--text); outline: none;
  }
  input:focus, textarea:focus { border-color: var(--accent); background: #fff; }
  textarea { resize: vertical; line-height: 1.6; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 90px 120px; gap: 10px; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; }
  .tag { border: 1px solid var(--border2); border-radius: 99px; padding: 4px 13px; font-size: 12px; color: var(--text2); cursor: pointer; user-select: none; background: var(--surface); }
  .tag.selected { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .dish-block { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 10px; }
  .dish-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .dish-label { font-size: 12px; font-weight: 600; color: var(--text2); }
  .remove-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; }
  .add-dish-btn { width: 100%; padding: 9px; background: none; border: 1px dashed var(--border2); border-radius: var(--radius-sm); font-size: 13px; color: var(--text2); cursor: pointer; margin-bottom: 14px; }
  .gen-btn { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 0.5rem; }
  .gen-btn:disabled { opacity: 0.5; }
  .output-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-top: 1.25rem; display: none; }
  .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .output-label { font-size: 11px; font-weight: 600; color: var(--text3); }
  .copy-btn { font-size: 12px; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 11px; cursor: pointer; }
  .output-text { font-size: 14px; line-height: 1.85; color: var(--text); white-space: pre-wrap; word-break: break-word; }
  .loading { font-size: 14px; color: var(--text2); text-align: center; padding: 1.5rem 0; }
  @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; } .grid-3 { grid-template-columns: 1fr 80px; } .grid-3 input:nth-child(3) { grid-column: 1 / -1; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>✍️ IG 貼文文案產生器</h1>
    <p>填入店家資訊，自動生成探店風格貼文</p>
  </header>

  <div class="card">
    <div class="card-title">🔑 Gemini API Key</div>
    <input type="password" id="api-key" placeholder="AIza..." />
  </div>

  <div class="card">
    <div class="card-title">📍 店家基本資料</div>
    <div class="grid-3">
      <div><label>地點</label><input type="text" id="location" placeholder="ex: 屏東" /></div>
      <div><label>店名</label><input type="text" id="shopname" placeholder="ex: 焦個朋友" /></div>
      <div><label>副標題</label><input type="text" id="subtitle" placeholder="ex: 花生豆腐蔬食店" /></div>
    </div>
    <label>開頭介紹</label>
    <textarea id="intro" rows="2" placeholder="特色介紹..."></textarea>
    <div style="margin-top:12px;">
      <label style="margin-bottom:8px;">葷素屬性</label>
      <div class="tag-row" id="veg-tags">
        <span class="tag" data-val="">不標注</span>
        <span class="tag selected" data-val="純素">純素</span>
        <span class="tag" data-val="蛋奶素">蛋奶素</span>
        <span class="tag" data-val="葷素共食">葷素共食</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🍽️ 料理</div>
    <div id="dishes-container"></div>
    <button class="add-dish-btn" onclick="addDish()">＋ 新增料理</button>
  </div>

  <div class="card">
    <div class="card-title">🏠 店家資訊</div>
    <label>地址</label><input type="text" id="address" placeholder="地址..." />
    <div class="grid-2" style="margin-top:10px;">
      <div><label>電話</label><input type="text" id="phone" placeholder="電話..." /></div>
      <div><label>營業時間</label><input type="text" id="hours" placeholder="營業時間..." /></div>
    </div>
    <label>其他補充</label><textarea id="extra" rows="2" placeholder="補充..."></textarea>
  </div>

  <button class="gen-btn" id="gen-btn" onclick="generate()">✨ 產生文案</button>

  <div class="output-card" id="output-card">
    <div class="output-header">
      <span class="output-label">📱 產生的貼文</span>
      <button class="copy-btn" onclick="copyText()">📋 複製</button>
    </div>
    <div id="output-content"></div>
  </div>
</div>

<script>
let dishCount = 0;
let selectedVeg = '純素';

document.addEventListener("DOMContentLoaded", () => {
  const savedKey = localStorage.getItem("gemini_api_key");
  if (savedKey) document.getElementById("api-key").value = savedKey;
});

document.querySelectorAll('#veg-tags .tag').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('#veg-tags .tag').forEach(x => x.classList.remove('selected'));
    t.classList.add('selected');
    selectedVeg = t.dataset.val;
  });
});

function addDish() {
  dishCount++;
  const id = dishCount;
  const container = document.getElementById('dishes-container');
  const block = document.createElement('div');
  block.className = 'dish-block';
  block.id = 'dish-' + id;
  block.innerHTML = `
    <div class="dish-header"><span class="dish-label">料理 ${id}</span><button class="remove-btn" onclick="removeDish(${id})">&times;</button></div>
    <div class="grid-3">
      <input type="text" placeholder="料理名稱" id="dish-name-${id}" />
      <input type="number" placeholder="價格" id="dish-price-${id}" />
      <input type="text" placeholder="加購/套餐" id="dish-add-${id}" />
    </div>
    <textarea rows="2" placeholder="心得..." id="dish-note-${id}" style="width:100%; margin-top:8px;"></textarea>
  `;
  container.appendChild(block);
}

function removeDish(id) {
  const el = document.getElementById('dish-' + id);
  if (el) el.remove();
}

function getDishes() {
  const results = [];
  document.querySelectorAll('[id^="dish-name-"]').forEach(el => {
    const id = el.id.replace('dish-name-', '');
    const name = el.value.trim();
    if (!name) return;
    const price = document.getElementById('dish-price-' + id)?.value.trim() || '';
    const add = document.getElementById('dish-add-' + id)?.value.trim() || '';
    const note = document.getElementById('dish-note-' + id)?.value.trim() || '';
    results.push({ name, price, add, note });
  });
  return results;
}

async function generate() {
  const apiKey = document.getElementById('api-key').value.trim();
  const shopname = document.getElementById('shopname').value.trim();
  if (!apiKey) { alert('請填入 Gemini API Key！'); return; }
  if (!shopname) { alert('請填寫店名！'); return; }

  localStorage.setItem("gemini_api_key", apiKey);
  const btn = document.getElementById('gen-btn');
  const outputCard = document.getElementById('output-card');
  const outputContent = document.getElementById('output-content');

  btn.disabled = true;
  btn.textContent = '生成中...';
  outputCard.style.display = 'block';
  outputContent.innerHTML = '<div class="loading">✦ 文案生成中...</div>';

  const dishes = getDishes();
  const dishLines = dishes.map((d, i) => `◆ ${d.name} $${d.price} ${d.add ? d.add : ''}\n心得：${d.note}`).join('\n\n');

  const prompt = `你是一個擅長寫 IG 美食探店貼文的文案寫手。請根據以下資訊，生成一篇自然、口語、有個人感的中文 IG 貼文。\n\n店名：${shopname}\n地點：${document.getElementById('location').value}\n副標題：${document.getElementById('subtitle').value}\n葷素：${selectedVeg}\n介紹：${document.getElementById('intro').value}\n\n料理項目：\n${dishLines}\n\n店家資訊：\n地址：${document.getElementById('address').value}\n電話：${document.getElementById('phone').value}\n營業時間：${document.getElementById('hours').value}\n補充：${document.getElementById('extra').value}\n\n請直接輸出貼文，適量加入emoji，不要有前言。`;

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await response.json();
    if (data.error) {
      outputContent.innerHTML = `<div class="output-text" style="color:red;">❌ 錯誤：${data.error.message}</div>`;
    } else {
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '生成失敗';
      outputContent.innerHTML = `<div class="output-text" id="result-text">${escapeHtml(text)}</div>`;
    }
  } catch (err) {
    outputContent.innerHTML = `<div class="output-text" style="color:red;">❌ 錯誤：${err.message}</div>`;
  }
  btn.disabled = false;
  btn.textContent = '✨ 產生文案';
}

function copyText() {
  const el = document.getElementById('result-text');
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ 已複製！';
    setTimeout(() => { btn.textContent = '📋 複製'; }, 1500);
  });
}
function escapeHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
addDish();
</script>
</body>
</html>
