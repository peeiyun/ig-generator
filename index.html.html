<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IG 貼文文案產生器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --surface2: #f3f2ef;
    --border: #e2e0db;
    --border2: #cccac4;
    --text: #1a1a18;
    --text2: #6b6960;
    --text3: #a39f96;
    --accent: #c8773a;
    --accent-light: #fdf0e6;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  header p {
    margin-top: 6px;
    font-size: 13px;
    color: var(--text2);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 5px;
    margin-top: 10px;
  }
  label:first-of-type { margin-top: 0; }

  input[type="text"],
  input[type="number"],
  input[type="password"],
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 14px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus {
    border-color: var(--accent);
    background: #fff;
  }
  textarea { resize: vertical; line-height: 1.6; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 90px 120px; gap: 10px; }

  .tag-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; }
  .tag {
    border: 1px solid var(--border2);
    border-radius: 99px;
    padding: 4px 13px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    user-select: none;
    background: var(--surface);
    transition: all 0.12s;
  }
  .tag:hover { border-color: var(--accent); color: var(--accent); }
  .tag.selected {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  .dish-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 10px;
  }
  .dish-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .dish-label { font-size: 12px; font-weight: 600; color: var(--text2); }
  .remove-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 18px;
    line-height: 1;
    padding: 0 2px;
  }
  .remove-btn:hover { color: #c0392b; }

  .add-dish-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 9px;
    background: none;
    border: 1px dashed var(--border2);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    margin-bottom: 14px;
    font-family: inherit;
    transition: all 0.12s;
  }
  .add-dish-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .gen-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.3px;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .gen-btn:hover { opacity: 0.9; }
  .gen-btn:active { transform: scale(0.99); }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .output-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-top: 1.25rem;
    display: none;
  }
  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .output-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; }
  .copy-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text2);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 11px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  .output-text {
    font-size: 14px;
    line-height: 1.85;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .loading {
    font-size: 14px;
    color: var(--text2);
    text-align: center;
    padding: 1.5rem 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .dot-anim::after {
    content: '';
    animation: dots 1.2s infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    33%  { content: '.'; }
    66%  { content: '..'; }
    100% { content: '...'; }
  }

  .api-notice {
    font-size: 12px;
    color: var(--text3);
    margin-top: 6px;
  }
  .api-notice a { color: var(--accent); text-decoration: none; }
  .api-notice a:hover { text-decoration: underline; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

  @media (max-width: 480px) {
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr 80px; }
    .grid-3 input:nth-child(3) { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>✍️ IG 貼文文案產生器</h1>
    <p>填入店家資訊，自動生成探店風格貼文</p>
  </header>

  <!-- API Key -->
  <div class="card">
    <div class="card-title">🔑 Gemini API Key</div>
    <input type="password" id="api-key" placeholder="AIza..." />
    <p class="api-notice">Key 只存在瀏覽器本機，不會上傳。沒有 Key 請至 <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> 免費申請。</p>
  </div>

  <!-- 基本資料 -->
  <div class="card">
    <div class="card-title">📍 店家基本資料</div>
    <div class="grid-3">
      <div>
        <label>地點</label>
        <input type="text" id="location" placeholder="ex: 屏東、高雄" />
      </div>
      <div>
        <label>店名</label>
        <input type="text" id="shopname" placeholder="ex: 焦個朋友" />
      </div>
      <div>
        <label>副標題</label>
        <input type="text" id="subtitle" placeholder="ex: 花生豆腐蔬食店" />
      </div>
    </div>
    <label>開頭介紹（位置、特色、適合誰）</label>
    <textarea id="intro" rows="2" placeholder="ex: 位於潮州車站附近的蔬食店，以花生豆腐為主題，價格超平價..."></textarea>

    <div style="margin-top:12px;">
      <label style="margin-bottom:8px;">葷素屬性</label>
      <div class="tag-row" id="veg-tags">
        <span class="tag" data-val="">不標注</span>
        <span class="tag selected" data-val="純素">純素</span>
        <span class="tag" data-val="蛋奶素">蛋奶素</span>
        <span class="tag" data-val="葷素共食">葷素共食</span>
        <span class="tag" data-val="葷食">葷食</span>
      </div>
    </div>
  </div>

  <!-- 料理 -->
  <div class="card">
    <div class="card-title">🍽️ 料理</div>
    <div id="dishes-container"></div>
    <button class="add-dish-btn" onclick="addDish()">＋ 新增料理</button>
  </div>

  <!-- 店家資訊 -->
  <div class="card">
    <div class="card-title">🏠 店家資訊</div>
    <label>地址</label>
    <input type="text" id="address" placeholder="ex: 屏東縣潮州鎮五福路19號" />
    <div class="grid-2" style="margin-top:10px;">
      <div>
        <label>電話（選填）</label>
        <input type="text" id="phone" placeholder="ex: 08-7880000" />
      </div>
      <div>
        <label>營業時間（選填）</label>
        <input type="text" id="hours" placeholder="ex: 11:00-21:00，週一公休" />
      </div>
    </div>
    <label>其他補充</label>
    <textarea id="extra" rows="2" placeholder="ex: 捷運可到、需預約、停車方便..."></textarea>
  </div>

  <button class="gen-btn" id="gen-btn" onclick="generate()">✨ 產生文案</button>

  <!-- 輸出 -->
  <div class="output-card" id="output-card">
    <div class="output-header">
      <span class="output-label">📱 產生的貼文</span>
      <button class="copy-btn" onclick="copyText()">📋 複製</button>
    </div>
    <div id="output-content"></div>
  </div>

</div>

<script>
let dishCount = 0;
let selectedVeg = '純素';

document.querySelectorAll('#veg-tags .tag').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('#veg-tags .tag').forEach(x => x.classList.remove('selected'));
    t.classList.add('selected');
    selectedVeg = t.dataset.val;
  });
});

function addDish() {
  dishCount++;
  const id = dishCount;
  const container = document.getElementById('dishes-container');
  const block = document.createElement('div');
  block.className = 'dish-block';
  block.id = 'dish-' + id;
  block.innerHTML = `
    <div class="dish-header">
      <span class="dish-label">料理 ${id}</span>
      <button class="remove-btn" onclick="removeDish(${id})" aria-label="移除">&times;</button>
    </div>
    <div class="grid-3">
      <input type="text" placeholder="料理名稱" id="dish-name-${id}" />
      <input type="number" placeholder="價格 $" id="dish-price-${id}" min="0" />
      <input type="text" placeholder="加購 / 套餐" id="dish-add-${id}" />
    </div>
    <textarea rows="2" placeholder="口感、特色心得..." id="dish-note-${id}" style="width:100%; margin-top:8px;"></textarea>
  `;
  container.appendChild(block);
}

function removeDish(id) {
  const el = document.getElementById('dish-' + id);
  if (el) el.remove();
}

function getDishes() {
  const results = [];
  document.querySelectorAll('[id^="dish-name-"]').forEach(el => {
    const id = el.id.replace('dish-name-', '');
    const name = el.value.trim();
    if (!name) return;
    const price = document.getElementById('dish-price-' + id)?.value.trim();
    const add = document.getElementById('dish-add-' + id)?.value.trim();
    const note = document.getElementById('dish-note-' + id)?.value.trim();
    results.push({ name, price, add, note });
  });
  return results;
}

async function generate() {
  const apiKey = document.getElementById('api-key').value.trim();
  const location = document.getElementById('location').value.trim();
  const shopname = document.getElementById('shopname').value.trim();
  const subtitle = document.getElementById('subtitle').value.trim();
  const intro = document.getElementById('intro').value.trim();
  const address = document.getElementById('address').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const hours = document.getElementById('hours').value.trim();
  const extra = document.getElementById('extra').value.trim();
  const dishes = getDishes();

  if (!apiKey) { alert('請填入 Anthropic API Key！'); return; }
  if (!shopname) { alert('請填寫店名！'); return; }

  const btn = document.getElementById('gen-btn');
  const outputCard = document.getElementById('output-card');
  const outputContent = document.getElementById('output-content');

  btn.disabled = true;
  btn.textContent = '生成中...';
  outputCard.style.display = 'block';
  outputContent.innerHTML = '<div class="loading"><span>✦</span><span class="dot-anim">文案生成中</span></div>';

  const dishLines = dishes.map((d, i) => {
    let line = `料理${i+1}：${d.name}`;
    if (d.price) line += `，$${d.price}`;
    if (d.add) line += `，加購/套餐：${d.add}`;
    if (d.note) line += `\n心得：${d.note}`;
    return line;
  }).join('\n');

  const infoLines = [
    address && `地址：${address}`,
    phone && `電話：${phone}`,
    hours && `營業時間：${hours}`,
  ].filter(Boolean).join('\n');

  const prompt = `你是一個擅長寫 IG 美食探店貼文的文案寫手。請根據以下資訊，模仿範例風格，生成一篇自然、口語、有個人感的中文 IG 貼文。

【範例格式與風格】
<屏東>焦個朋友 ✨花生豆腐蔬食店
➪ #純素

位於潮州車站附近的蔬食店，店內招牌甜品花生酪，還有一些花生豆腐做的特色料理，價格超級平價，有機會來附近玩可以來嚐鮮。

◆大阪燒富都 $70 +A套餐$35
用花生豆腐做的大阪燒，吃起來不會違和，比起一般吃到的蔬食大阪燒清爽。套餐付的小菜有一小塊花生豆腐，可以吃到原味的濃郁花生豆腐味👍

◆流心時蔬拌飯 $90 +A套餐$35
中規中矩的台式拌飯！套餐的湯是豆漿味味噌湯，很特別，我自己蠻喜歡的😆

🏠店家資訊
地址：屏東縣潮州鎮五福路19號

【風格要求】
- 第一行固定格式：<地點>店名 ✨副標題
- 第二行（如有葷素）：➪ #葷素標注
- 接著一段介紹（口語、輕鬆、不浮誇）
- 每道料理格式：◆料理名 $價格（加購寫在同行）\n心得1-3句
- 最後 🏠店家資訊（地址、電話、營業時間，有什麼放什麼）
- 整體語氣像在跟朋友推薦，偶爾帶小幽默或括號補充，適量 emoji

【這次資料】
地點：${location || '未填'}
店名：${shopname}
副標題：${subtitle || ''}
葷素：${selectedVeg || '不標注'}
開頭介紹：${intro || ''}
料理：
${dishLines || '無'}
${infoLines}
補充：${extra || '無'}

請直接輸出貼文，不要加任何說明或前言。`;

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }]
        })
      }
    );

    const data = await response.json();

    if (data.error) {
      outputContent.innerHTML = `<div class="output-text" style="color:#c0392b;">❌ 錯誤：${data.error.message}</div>`;
    } else {
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '生成失敗，請再試一次。';
      outputContent.innerHTML = `<div class="output-text" id="result-text">${escapeHtml(text)}</div>`;
    }
  } catch (err) {
    outputContent.innerHTML = `<div class="output-text" style="color:#c0392b;">❌ 錯誤：${err.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = '✨ 產生文案';
}

function copyText() {
  const el = document.getElementById('result-text');
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ 已複製！';
    setTimeout(() => { btn.textContent = '📋 複製'; }, 1500);
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

addDish();
</script>
</body>
</html>
